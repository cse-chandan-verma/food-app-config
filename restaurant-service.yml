server:
  port: 8081

spring:
  application:
    name: restaurant-service
  datasource:
    url: jdbc:mysql://localhost:3306/restaurantdb?createDatabaseIfNotExist=true
    username: root
    password: ch@nd@n_V03
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
